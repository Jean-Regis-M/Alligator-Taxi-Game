kind = "web"
previewPath = "/"
title = "Crazy Taxi"
version = "1.0.0"
id = "artifacts/crazy-taxi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24063

[services.development]
run = "pnpm --filter @workspace/crazy-taxi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crazy-taxi", "run", "build" ]
publicDir = "artifacts/crazy-taxi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24063"
BASE_PATH = "/"
